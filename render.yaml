services:
  - type: web
    name: bayitpro-backend
    env: python
    plan: free                          # upgrade to starter for always-on
    region: frankfurt                   # or oregon / singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: ENV
        value: production

      # Paste your Supabase Postgres URI here via the Render dashboard.
      # Format: postgresql://postgres:[PASSWORD]@db.[REF].supabase.co:5432/postgres
      # Do NOT use the Supabase project URL (https://...supabase.co) — use the direct Postgres connection string.
      - key: DATABASE_URL
        sync: false

      # Set these manually in the Render dashboard (mark as secret)
      - key: JWT_SECRET_KEY
        generateValue: true             # Render generates a random value on first deploy

      - key: ALLOWED_ORIGINS
        sync: false                     # set to your Render app URL (and Vercel URL if using split deploy)

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: TWILIO_ACCOUNT_SID
        sync: false

      - key: TWILIO_AUTH_TOKEN
        sync: false

      - key: TWILIO_WHATSAPP_FROM
        sync: false

      - key: TWILIO_VERIFY_SIGNATURE
        value: "false"                  # set to true once you configure Twilio webhook URL
